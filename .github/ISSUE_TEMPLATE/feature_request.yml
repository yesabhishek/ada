name: Feature request
description: Suggest a workflow or capability improvement for Ada.
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is missing or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed improvement
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Repo type, language, or AI workflow details that matter.
